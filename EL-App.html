<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Extensive Reading App</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
</head>

<body>
  <div id="container"></div>

  <script type="text/babel">
    'use strict';

    {
      const { useState, useEffect, useRef } = React;

      const HeroSection = () => (
        <section className="relative">
          <div className="flex flex-col items-center justify-center p-6">
            <h1 className="text-5xl mt-28 mb-6 text-center leading-tight">Extensive<br />Reading</h1>

            <img src="img/deco1.png" className="w-64 z-10" />

            <div className="relative">
              <div className="w-60 h-60 flex items-center justify-center rounded-full border-[40px] border-rose-100 bg-white -mt-7">
                <div className="text-center">
                  <span className="text-6xl font-bold">16</span>
                  <span className="text-2xl font-bold">%</span>
                  <p className="text-sm text-gray-500 mt-1">100,000 words</p>
                </div>
              </div>

              <img
                src="img/deco2.png"
                className="absolute -right-8 -bottom-10 w-28"
              />
            </div>
          </div>
        </section>
      );

      const AnalysisSection = () => (
        <section className="bg-rose-50 mt-28  pt-20 pb-12 px-8 relative z-20">
          <div className="text-center mb-10">
            <img src="img/deco3.png" className="w-24 absolute left-8 -top-14 mb-4" />

            <h2 className="text-3xl mb-2 font-bold">Total</h2>

            <div className="text-lg  space-x-2">
              <span><strong>5788</strong> words</span>
              <span>/</span>
              <span><strong>300</strong> books</span>
              <span>/</span>
              <span><strong>30</strong> days</span>
            </div>
          </div>

          <div className="mb-12">
            <h3 className="text-center text-sm font-bold  tracking-widest uppercase">Level Proportion</h3>

            <div className="w-full h-10 bg-white rounded-full overflow-hidden flex shadow-inner border-2 border-white">
              {/* 比率は後でロジックで変えられるように組む */}
              <div className="w-[50%] bg-rose-400"></div>
              <div className="w-[30%] bg-rose-300"></div>
              <div className="w-[20%] bg-rose-200"></div>
            </div>
          </div>

          <div className="bg-white/60 pt-8 px-6 rounded-3xl shadow-sm">
            <h3 className="text-center text-sm font-bold mb-4 tracking-widest uppercase">Learning Streak</h3>

            <div className="grid grid-cols-12 gap-1.5">
              {[...Array(84)].map((_, i) => (
                <div
                  key={i}
                  className={`aspect-square rounded-[2px] ${i % 5 === 0 ? 'bg-rose-400' :
                    i % 5 === 1 ? 'bg-rose-200' :
                      'bg-gray-100'
                    }`}
                ></div>
              ))}
            </div>

            <img src="img/deco4.png" className="w-40 mx-auto mt-8" />
          </div>
        </section>
      );

      const FavoritesSection = () => (
        <section className="mt-12 p-8 pb-32 flex flex-col items-center">
          <h2 className="text-3xl font-bold mb-10">Favorites</h2>

          <div className="bg-rose-50 rounded-3xl mt-6 p-6 relative w-full h-[560px]">
            <div className="absolute -top-16 left-1/2 -translate-x-1/2">
              <img src="img/deco5.png" className="w-48" />
            </div>
            <div className="absolute -bottom-10 left-1/2 -translate-x-1/2">
              <img src="img/deco6.png" className="w-32" />
            </div>
          </div>
        </section>
      );

      const AddBtn = ({ onClose, showModal, onSave }) => {
        const translateClass = showModal ? "translate-y-0" : "translate-y-full";

        const today = new Date().toISOString().split('T')[0].replace(/-/g, '/');

        const [currentInput, setCurrentInput] = useState({
          date: today,
          title: '',
          words: '',
          series: 'ORT',
          level: 1,
        });
        const inputRef = useRef(null);

        const handleDateChange = (e) => {
          setCurrentInput({
            ...currentInput,
            date: e.currentTarget.value
          });
        };

        const handleTitleChange = (e) => {
          setCurrentInput({
            ...currentInput,
            title: e.currentTarget.value
          });
        };

        const handleWordsChange = (e) => {
          setCurrentInput({
            ...currentInput,
            words: Number(e.currentTarget.value)
          });
        };

        const handleSeriesChange = (e) => {
          setCurrentInput({
            ...currentInput,
            series: e.currentTarget.value
          });
        };

        const handleLevelChange = (e) => {
          setCurrentInput({
            ...currentInput,
            level: e.currentTarget.value
          });
        };

        const handleSubmit = (e) => {
          if (!currentInput.title || isNaN(currentInput.words) || currentInput.words <= 0) return;
          e.preventDefault();
          onSave(currentInput);
          setCurrentInput({
            ...currentInput,
            title: '',
            words: '',
          });
          inputRef.current.focus();
        }

        return (
          <>
            <div
              className={`
                flex-col px-8 py-6 fixed rounded-[2.5rem] bottom-0 left-1/2 -translate-x-1/2 w-full max-w-[431px] bg-rose-400 flex items-center justify-around z-[100] transition-transform duration-500 ease-in-out
                ${showModal ? 'translate-y-0' : 'translate-y-full'}`}
            >

              <form
                onSubmit={handleSubmit}
                className="bg-white w-full rounded-[2rem] pb-36 relative flex-grow mt-4">

                <div className="absolute top-4 right-5 flex gap-2">
                  <button
                    type="button"
                    className="w-10 h-10 rounded-full bg-rose-50 flex items-center justify-center shadow-sm">
                    <span className="material-symbols-outlined text-rose-400 text-xl mt-1">favorite</span>
                  </button>
                  <button
                    type="submit"
                    className="w-10 h-10 rounded-full bg-rose-50 flex items-center justify-center shadow-sm font-bold">
                    <span className="material-symbols-outlined text-rose-400 text-xl">check</span>
                  </button>
                </div>

                <h2 className="text-3xl text-center mt-20 mb-10">Add New record</h2>

                <div className="space-y-6 text-xl pl-12">
                  <div className="flex items-baseline border-b border-dotted border-gray-200 pb-1">
                    <span className="w-20">Date :</span>
                    <input
                      type="text"
                      defaultValue={today}
                      onChange={handleDateChange}
                      value={currentInput.date}
                      className="bg-transparent focus:outline-none"
                      placeholder="YYYY/MM/DD"
                    />
                  </div>
                  <div className="flex items-baseline border-b border-dotted border-gray-200 pb-1">
                    <span className="w-20">Title :</span>
                    <input
                      type="text"
                      placeholder="Enter title..."
                      onChange={handleTitleChange}
                      value={currentInput.title}
                      ref={inputRef}
                      className="flex-grow bg-transparent focus:outline-none placeholder:text-gray-400 transition-colors"
                    />
                  </div>
                  <div className="flex items-baseline border-b border-dotted border-gray-200 pb-1">
                    <span className="w-20">Words :</span>
                    <input
                      type="text"
                      placeholder="0"
                      onChange={handleWordsChange}
                      value={currentInput.words}
                      className="w-20 flex-grow bg-transparent focus:outline-none placeholder:text-gray-400 transition-colors"
                    />
                  </div>
                  <div className="flex items-baseline border-b border-dotted border-gray-200 pb-1">
                    <span className="w-20">Series :</span>
                    <select
                      onChange={handleSeriesChange}
                      value={currentInput.series}
                    >
                      <option>ORT</option>
                      <option>Other</option>
                    </select>
                  </div>
                  <div className="flex items-baseline border-b border-dotted border-gray-200 pb-1">
                    <span className="w-24">Level : ({currentInput.level}) </span>
                    <input
                      type="range"
                      min="1"
                      max="9"
                      defaultValue="1"
                      onChange={handleLevelChange}
                      value={currentInput.level}
                      className="accent-rose-400 w-38 h-2 bg-rose-50 rounded-lg appearance-none cursor-pointer"
                    />
                  </div>
                </div>
              </form>

              <nav className="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-[430px] h-20 bg-rose-400 flex items-center justify-around px-10 z-50">
                <div className="absolute bottom-14 right-0">
                  <img src="img/deco7.png" className="w-40" />
                </div>

                <button
                  type="button"
                  onClick={onClose}
                  className="w-12 h-12 bg-white rounded-full flex items-center justify-center"
                >
                  <span className="material-symbols-outlined text-3xl">close</span>
                </button>
              </nav>
            </div>
          </>
        )
      }

      const BottomNav = ({ onAddClick }) => (
        <nav className="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-[430px] h-20 bg-rose-400 flex items-center justify-around px-10  z-50">
          <button
            type="button"
            className="w-12 h-12 bg-white rounded-full flex items-center justify-center">
            <span className="material-symbols-outlined text-3xl">refresh</span>
          </button>

          <button
            type="button"
            onClick={onAddClick}
            className="w-12 h-12 bg-white rounded-full flex items-center justify-center"
          >
            <span className="material-symbols-outlined text-4xl">add</span>
          </button>

          <button
            type="button"
            className="w-12 h-12 bg-white rounded-full flex items-center justify-center">
            <span className="material-symbols-outlined text-3xl mt-2 ml-1">edit_note</span>
          </button>
        </nav>
      );

      const App = () => {
        const [showModal, setShowModal] = useState(false);

        const [records, setRecords] = useState(() => {
          const saved = localStorage.getItem('reading-app-data');
          return saved ? JSON.parse(saved) : [];
        });

        useEffect(() => {
          localStorage.setItem('reading-app-data', JSON.stringify(records));
        }, [records]);

        const addRecord = (newRecord) => {
          setRecords([newRecord, ...records]);
        };

        return (
          <>
            <main className="bg-rose-200">
              <div className="max-w-[430px] mx-auto min-h-screen bg-white font-serif shadow-xl overflow-hidden relative select-none">
                <HeroSection />
                <AnalysisSection />
                <FavoritesSection />

                <BottomNav onAddClick={() => setShowModal(true)} />

                <AddBtn
                  showModal={showModal}
                  onClose={() => setShowModal(false)}
                  onSave={addRecord}
                />
              </div>
            </main>
          </>
        );
      };

      const container = document.querySelector('#container');
      const root = ReactDOM.createRoot(container);
      root.render(<App />);
    }
  </script>
</body>

</html>
