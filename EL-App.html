<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Extensive Reading App</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body>
  <div id="container"></div>

  <script type="text/babel">
    'use strict';

    {
      const HeroSection = () => (
        <section className="relative flex flex-col items-center">
          <div className="flex flex-col items-center justify-center p-6">
            <h1 className="text-4xl font-serif mt-40 mb-6 text-center leading-tight">Extensive<br />Reading</h1>

            <img src="img/deco1.png" className="w-80 z-10" />

            <div className="relative">
              <div className="w-52 h-52 flex items-center justify-center rounded-full border-[35px] border-rose-100 bg-white -mt-9">
                <div className="text-center">
                  <span className="text-5xl font-bold">16%</span>
                  <p className="text-[10px] text-gray-400 mt-1">100,000 words</p>
                </div>
              </div>

              <img
                src="img/deco2.png"
                className="absolute -right-8 -bottom-10 w-28"
              />
            </div>
          </div>
        </section>
      );

      const AnalysisSection = () => (
        <section className="ana">

        </section>
      );

      const FavoritesSection = () => (
        <section className="fav">

        </section>
      );

      const BottomNav = () => (
        <section className="btn">

        </section>
      );

      const App = () => {
        return (
          <div className="max-w-[400px] mx-auto min-h-screen bg-white shadow-xl overflow-hidden relative">
            <HeroSection />
            <AnalysisSection />
            <FavoritesSection />
            <BottomNav />
          </div>
        );
      };

      const container = document.querySelector('#container');
      const root = ReactDOM.createRoot(container);
      root.render(<App />);
    }
  </script>
</body>

</html>
