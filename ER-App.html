<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Extensive Reading App</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
</head>

<body>
  <div id="container"></div>

  <script type="text/babel">
    'use strict';

    {
      const { useState, useEffect, useRef } = React;

      const HeroSection = ({ totalWords }) => {
        const semesterGoal = 100000;
        const percentage = Math.min(Math.floor((totalWords / semesterGoal) * 100), 100);

        const r = 50;
        const circumference = 2 * Math.PI * r;
        const offset = circumference - (percentage / 100) * circumference;

        return (
          <>
            <section className="relative">
              <div className="flex flex-col items-center justify-center p-6">
                <h1 className="text-5xl mt-28 mb-6 text-center leading-tight">Extensive<br />Reading</h1>

                <img src="img/deco1.png" className="w-64 z-10" />

                <div className="relative -mt-7 mb-20">
                  <div>
                    <svg width="240" height="240" viewBox="0 0 120 120">
                      <circle cx="60" cy="60" r={r} fill="none" stroke="#ffe4e6" strokeWidth="16" />

                      <circle
                        cx="60" cy="60" r={r} fill="none" stroke="#fb7185" strokeWidth="12"
                        transform="rotate(-90 60 60)"
                        strokeDasharray={circumference}
                        strokeDashoffset={offset}
                      />
                    </svg>
                    <div className="text-center -mt-40">
                      <span className="text-6xl font-bold">{percentage}</span>
                      <span className="text-2xl font-bold">%</span>
                      <p className="text-sm text-gray-500 mt-1">{semesterGoal.toLocaleString()} words</p>
                    </div>
                  </div>

                  <img
                    src="img/deco2.png"
                    className="absolute -right-10 -bottom-20 w-28"
                  />
                </div>
              </div>
            </section>
          </>
        )
      };

      const AnalysisSection = ({ totalWords, totalBooks, levelBookCounts, wordsByDate }) => {
        const getLevelBookWidth = (lvl) => {
          if (totalBooks === 0) return 0;
          return ((levelBookCounts[lvl] || 0) / totalBooks) * 100;
        };

        const calendarConfig = {
          start: "2026/04/10",
          end: "2026/07/17",
          classes: {
            "2026/04/10": 1, "2026/04/17": 2, "2026/04/24": 3, "2026/05/01": 4,
            "2026/05/08": 5, "2026/05/15": 6, "2026/05/22": 7, "2026/05/29": 8,
            "2026/06/05": 9, "2026/06/12": 10, "2026/06/19": 11, "2026/06/26": 12,
            "2026/07/10": 13, "2026/07/17": 14
          },
          holidays: ["2026/05/04", "2026/05/05", "2026/05/06", "2026/05/28", "2026/07/03"]
        };

        const maxDayWords = Math.max(...Object.values(wordsByDate), 0) || 1;

        const startDate = new Date("2026/04/05");
        const endDate = new Date("2026/07/18");
        const calendarDays = [];
        let curr = new Date(startDate);

        while (curr <= endDate) {
          calendarDays.push(new Date(curr));
          curr.setDate(curr.getDate() + 1);
        }

        const today = new Date();
        const todayStr = `${today.getFullYear()}/${String(today.getMonth() + 1).padStart(2, '0')}/${String(today.getDate()).padStart(2, '0')}`;

        const renderHeatMap = () => {
          return calendarDays.map((date) => {
            const dateStr = `${date.getFullYear()}/${String(date.getMonth() + 1).padStart(2, '0')}/${String(date.getDate()).padStart(2, '0')}`;
            const words = wordsByDate[dateStr] || 0;
            const classCount = calendarConfig.classes[dateStr];
            const isWeekend = date.getDay();
            const isHoliday = calendarConfig.holidays.includes(dateStr) || isWeekend === 0 || isWeekend === 6;
            const isToday = dateStr === todayStr;

            let bgColor = "bg-gray-100";
            if (words > 0) {
              const ratio = words / maxDayWords;
              if (ratio > 0.75) bgColor = "bg-rose-400";
              else if (ratio > 0.5) bgColor = "bg-rose-300";
              else if (ratio > 0.25) bgColor = "bg-rose-200";
              else bgColor = "bg-rose-100";
            } else if (isHoliday) {
              bgColor = "bg-gray-200";
            }

            return (
              <div
                key={dateStr}
                className={`w-4 h-4 rounded-[2px] relative flex items-center justify-center text-[8px] 
                  ${bgColor} ${isToday ? 'border border-rose-500' : ''}`}
              >

                {classCount && <span className="opacity-40 font-bold">{(classCount)}</span>}
              </div>
            );
          })
        }

        return (
          <>
            <section className="bg-rose-50 mt-28  pt-20 pb-12 px-8 relative z-20">
              <div className="text-center mb-10">
                <img src="img/deco3.png" className="w-24 absolute left-8 -top-14 mb-4" />

                <h2 className="text-3xl mb-2 font-bold">Total</h2>

                <div className="text-lg  space-x-2">
                  <span><strong>{totalWords.toLocaleString()}</strong> words</span>
                  <span>/</span>
                  <span><strong>{totalBooks.toLocaleString()}</strong> books</span>
                  <span>/</span>
                  <span><strong>30</strong> days</span>
                </div>
              </div>

              <div className="mb-12">
                <h3 className="text-center text-sm font-bold  tracking-widest uppercase">Level Proportion</h3>

                <div className="w-full h-10 bg-white rounded-full overflow-hidden flex shadow-inner border-2 border-white">
                  <div className="bg-rose-200" style={{ width: `${getLevelBookWidth("Beginner")}%` }}></div>
                  <div className="bg-rose-300" style={{ width: `${getLevelBookWidth("Intermediate")}%` }}></div>
                  <div className="bg-rose-400" style={{ width: `${getLevelBookWidth("Advanced")}%` }}></div>
                </div>

                <div className="text-xs text-right space-x-3 pr-1">
                  <span>Lv.1 : {levelBookCounts["Beginner"] || 0}</span>
                  <span>Lv.2 : {levelBookCounts["Intermediate"] || 0}</span>
                  <span>Lv.3 : {levelBookCounts["Advanced"] || 0}</span>
                </div>
              </div>

              <div className="bg-white/60 pt-8 px-6 rounded-3xl shadow-sm">
                <h3 className="text-center text-sm font-bold mb-4 tracking-widest uppercase">Learning Streak</h3>

                <div className="grid grid-flow-col grid-rows-7 gap-1 overflow-x-auto pb-2">
                  {renderHeatMap()}
                </div>
                <div className="flex justify-between mt-4 text-[10px] px-6 tracking-tighter">
                  <span>April</span>
                  <span>May</span>
                  <span>June</span>
                  <span>July</span>
                </div>

                <img src="img/deco4.png" className="w-40 mx-auto mt-8" />
              </div>
            </section>
          </>
        )
      };

      const FavoritesSection = () => (
        <section className="mt-12 p-8 pb-32 flex flex-col items-center">
          <h2 className="text-3xl font-bold mb-10">Favorites</h2>

          <div className="bg-rose-50 rounded-3xl mt-6 p-6 relative w-full h-[560px]">
            <div className="absolute -top-16 left-1/2 -translate-x-1/2">
              <img src="img/deco5.png" className="w-48" />
            </div>
            <div className="absolute -bottom-10 left-1/2 -translate-x-1/2">
              <img src="img/deco6.png" className="w-32" />
            </div>
          </div>
        </section>
      );

      const AddBtn = ({ onClose, showModal, onSave }) => {
        const translateClass = showModal ? "translate-y-0" : "translate-y-full";

        const today = new Date();
        const todayStr = `${today.getFullYear()}/${String(today.getMonth() + 1).padStart(2, '0')}/${String(today.getDate()).padStart(2, '0')}`;

        const [currentInput, setCurrentInput] = useState({
          date: todayStr,
          title: '',
          words: '',
          series: 'ORT',
          level: 1,
          isFavorite: false,
        });
        const inputRef = useRef(null);

        const handleDateChange = (e) => {
          setCurrentInput({
            ...currentInput,
            date: e.currentTarget.value
          });
        };

        const handleTitleChange = (e) => {
          setCurrentInput({
            ...currentInput,
            title: e.currentTarget.value
          });
        };

        const handleWordsChange = (e) => {
          setCurrentInput({
            ...currentInput,
            words: Number(e.currentTarget.value)
          });
        };

        const handleSeriesChange = (e) => {
          setCurrentInput({
            ...currentInput,
            series: e.currentTarget.value
          });
        };

        const handleLevelChange = (e) => {
          setCurrentInput({
            ...currentInput,
            level: e.currentTarget.value
          });
        };

        const handleIsFavoriteBtn = () => {
          setCurrentInput({
            ...currentInput,
            isFavorite: !currentInput.isFavorite
          });
        };

        const handleSubmit = (e) => {
          e.preventDefault();

          if (!currentInput.title || isNaN(currentInput.words) || currentInput.words < 0) return;

          onSave(currentInput);
          setCurrentInput({
            ...currentInput,
            title: '',
            words: '',
            isFavorite: false,
          });
          inputRef.current.focus();
        }

        return (
          <>
            <div
              className={`
                flex-col px-8 py-6 fixed rounded-[2.5rem] bottom-0 left-1/2 -translate-x-1/2 w-full max-w-[431px] bg-rose-400 flex items-center justify-around z-[100] transition-transform duration-500 ease-in-out
                ${showModal ? 'translate-y-0' : 'translate-y-full'}`}
            >

              <form
                onSubmit={handleSubmit}
                className="bg-white w-full rounded-[2rem] pb-36 relative flex-grow mt-4">

                <div className="absolute top-4 right-5 flex gap-2">
                  <button
                    type="button"
                    onClick={handleIsFavoriteBtn}
                    className="w-10 h-10 rounded-full bg-rose-50 flex items-center justify-center shadow-sm">
                    <span
                      className="text-rose-400 text-xl mt-1 material-symbols-outlined"
                      style={{ fontVariationSettings: currentInput.isFavorite ? "'FILL' 1" : "'FILL' 0" }}
                    >favorite</span>
                  </button>
                  <button
                    type="submit"
                    className="w-10 h-10 rounded-full bg-rose-50 flex items-center justify-center shadow-sm font-bold">
                    <span className="material-symbols-outlined text-rose-400 text-xl">check</span>
                  </button>
                </div>

                <h2 className="text-3xl text-center mt-20 mb-10">Add New record</h2>

                <div className="space-y-6 text-xl pl-12">
                  <div className="flex items-baseline border-b border-dotted border-gray-200 pb-1">
                    <span className="w-20">Date :</span>
                    <input
                      type="text"
                      onChange={handleDateChange}
                      value={currentInput.date}
                      className="bg-transparent focus:outline-none"
                      placeholder="YYYY/MM/DD"
                    />
                  </div>
                  <div className="flex items-baseline border-b border-dotted border-gray-200 pb-1">
                    <span className="w-20">Title :</span>
                    <input
                      type="text"
                      lang="en"
                      placeholder="Enter title..."
                      onChange={handleTitleChange}
                      value={currentInput.title}
                      ref={inputRef}
                      className="flex-grow bg-transparent focus:outline-none placeholder:text-gray-400 transition-colors"
                    />
                  </div>
                  <div className="flex items-baseline border-b border-dotted border-gray-200 pb-1">
                    <span className="w-20">Words :</span>
                    <input
                      type="text"
                      inputMode="numeric"
                      pattern="\d*"
                      placeholder="0"
                      onChange={handleWordsChange}
                      value={currentInput.words}
                      className="w-20 flex-grow bg-transparent focus:outline-none placeholder:text-gray-400 transition-colors"
                    />
                  </div>
                  <div className="flex items-baseline border-b border-dotted border-gray-200 pb-1">
                    <span className="w-20">Series :</span>
                    <select
                      onChange={handleSeriesChange}
                      value={currentInput.series}
                    >
                      <option>ORT</option>
                      <option>Other</option>
                    </select>
                  </div>
                  <div className="flex items-baseline border-b border-dotted border-gray-200 pb-1">
                    <span className="w-24">Level : ({currentInput.level}) </span>
                    <input
                      type="range"
                      min="1"
                      max="9"
                      onChange={handleLevelChange}
                      value={currentInput.level}
                      className="accent-rose-400 w-38 h-2 bg-rose-50 rounded-lg appearance-none cursor-pointer"
                    />
                  </div>
                </div>
              </form>

              <nav className="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-[430px] h-20 bg-rose-400 flex items-center justify-around px-10 z-50">
                <div className="absolute bottom-14 right-0">
                  <img src="img/deco7.png" className="w-40" />
                </div>

                <button
                  type="button"
                  onClick={onClose}
                  className="w-12 h-12 bg-white rounded-full flex items-center justify-center"
                >
                  <span className="material-symbols-outlined text-3xl">close</span>
                </button>
              </nav>
            </div>
          </>
        )
      };

      const BottomNav = ({ onAddClick }) => (
        <nav className="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-[430px] h-20 bg-rose-400 flex items-center justify-around px-10  z-50">
          <button
            type="button"
            className="w-12 h-12 bg-white rounded-full flex items-center justify-center">
            <span className="material-symbols-outlined text-3xl">refresh</span>
          </button>

          <button
            type="button"
            onClick={onAddClick}
            className="w-12 h-12 bg-white rounded-full flex items-center justify-center"
          >
            <span className="material-symbols-outlined text-4xl">add</span>
          </button>

          <button
            type="button"
            className="w-12 h-12 bg-white rounded-full flex items-center justify-center">
            <span className="material-symbols-outlined text-3xl mt-2 ml-1">edit_note</span>
          </button>
        </nav>
      );

      const App = () => {
        const [showModal, setShowModal] = useState(false);

        const [records, setRecords] = useState(() => {
          const saved = localStorage.getItem('reading-app-data');
          return saved ? JSON.parse(saved) : [];
        });

        useEffect(() => {
          localStorage.setItem('reading-app-data', JSON.stringify(records));
        }, [records]);

        const addRecord = (newRecord) => {
          setRecords([newRecord, ...records]);
        };

        const totalWords = records.reduce((sum, record) => sum + Number(record.words || 0), 0);
        const totalBooks = records.length;

        const levelBookCounts = records.reduce((sum, record) => {
          let group;

          if (record.series === "ORT") {
            if (record.level <= 3) group = "Beginner";
            else if (record.level <= 6) group = "Intermediate";
            else group = "Advanced";
          }

          sum[group] = (sum[group] || 0) + 1;
          return sum;
        }, {});

        const wordsByDate = records.reduce((sum, r) => {
          sum[r.date] = (sum[r.date] || 0) + Number(r.words);
          return sum;
        }, {});

        return (
          <>
            <main className="bg-rose-200">
              <div className="max-w-[430px] mx-auto min-h-screen bg-white font-serif shadow-xl overflow-hidden relative select-none">
                <HeroSection
                  totalWords={totalWords}
                />
                <AnalysisSection
                  totalWords={totalWords}
                  totalBooks={totalBooks}
                  levelBookCounts={levelBookCounts}
                  wordsByDate={wordsByDate}
                />
                <FavoritesSection />

                <BottomNav
                  onAddClick={() => setShowModal(true)}
                />

                <AddBtn
                  showModal={showModal}
                  onClose={() => setShowModal(false)}
                  onSave={addRecord}
                />
              </div>
            </main>
          </>
        );
      };

      const container = document.querySelector('#container');
      const root = ReactDOM.createRoot(container);
      root.render(<App />);
    }
  </script>
</body>

</html>
